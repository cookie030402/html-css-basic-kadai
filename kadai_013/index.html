<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organic Cafe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Organic Cafe">
    </a>
    <img id="menu-sp" src="button-menu.png" alt="メニューを開く"
         onclick="document.getElementById('nav-sp').classList.add('open')">
  </header>

  <nav id="nav-sp">
    <img id="close" src="button-close.png" alt="閉じる"
         onclick="document.getElementById('nav-sp').classList.remove('open')">
    <a id="logo-sp" href="index.html" onclick="closeMenu()">
      <img src="logo-sp.png" alt="トップへ">
    </a>
    
    <a class="menu" href="#concept" onclick="closeMenu()">CONCEPT <span>&gt;</span></a>
    <a class="menu" href="#product" onclick="closeMenu()">PRODUCT <span>&gt;</span></a>
    <a class="menu" href="#contact" onclick="closeMenu()">CONTACT <span>&gt;</span></a>
  </nav>

  <main>
    <section class="fv">
      <h1>Organic Cafe</h1>
      <p>自家焙煎コーヒーが買えるお店</p>
      <img src="main-image.jpg" alt="コーヒー">
    </section>
  </main>

  <script>
    function closeMenu() {
      document.getElementById('nav-sp').classList.remove('open');
    }
  </script>
</body>
</html>
